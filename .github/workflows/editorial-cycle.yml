name: editorial-cycle

# Runs the full editorial cycle every 2 hours.
# LOOKBACK_HOURS is set to 2 to match the cadence so the feed window doesn't
# either miss items (too short) or over-fetch and rely on dedup (too long).

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      top_n:
        description: "Max stories to publish this cycle"
        required: false
        default: "5"
      lookback_hours:
        description: "Feed lookback window (hours)"
        required: false
        default: "2"

concurrency:
  group: editorial-cycle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run cycle
        env:
          # Core
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Image cascade (optional — curated pool + headshot + logo work without these)
          IMAGE_SELECTION_URL: ${{ secrets.IMAGE_SELECTION_URL }}
          GOOGLE_CUSTOM_SEARCH_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_KEY }}
          GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}

          # Cadence
          TOP_N: ${{ github.event.inputs.top_n || '5' }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '2' }}
        run: |
          # Only export model-override env vars when the repo variable is set
          # and non-empty — otherwise pydantic-settings would coerce "" into
          # an empty model name and the OpenAI API rejects it with 400.
          set -euo pipefail
          if [ -n "${{ vars.OPENAI_MODEL_ARTICLE_DATA_AGENT }}" ]; then
            export OPENAI_MODEL_ARTICLE_DATA_AGENT="${{ vars.OPENAI_MODEL_ARTICLE_DATA_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_STORY_CLUSTER_AGENT }}" ]; then
            export OPENAI_MODEL_STORY_CLUSTER_AGENT="${{ vars.OPENAI_MODEL_STORY_CLUSTER_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_EDITORIAL_ORCHESTRATOR_AGENT }}" ]; then
            export OPENAI_MODEL_EDITORIAL_ORCHESTRATOR_AGENT="${{ vars.OPENAI_MODEL_EDITORIAL_ORCHESTRATOR_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_ARTICLE_WRITER_AGENT }}" ]; then
            export OPENAI_MODEL_ARTICLE_WRITER_AGENT="${{ vars.OPENAI_MODEL_ARTICLE_WRITER_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_PERSONA_SELECTOR_AGENT }}" ]; then
            export OPENAI_MODEL_PERSONA_SELECTOR_AGENT="${{ vars.OPENAI_MODEL_PERSONA_SELECTOR_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT }}" ]; then
            export OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT="${{ vars.OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_EDITORIAL_MEMORY_AGENT }}" ]; then
            export OPENAI_MODEL_EDITORIAL_MEMORY_AGENT="${{ vars.OPENAI_MODEL_EDITORIAL_MEMORY_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_VISION_VALIDATOR }}" ]; then
            export OPENAI_MODEL_VISION_VALIDATOR="${{ vars.OPENAI_MODEL_VISION_VALIDATOR }}"
          fi
          mkdir -p var
          editorial-cycle run --output-json var/output.json

      - name: Persist editorial memory
        if: always()
        run: |
          set -euo pipefail
          if ! git status --short -- editorial_memory | grep -q .; then
            echo "No editorial memory changes to persist."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editorial_memory

          if git diff --cached --quiet; then
            echo "No staged editorial memory changes."
            exit 0
          fi

          git commit -m "Update editorial memory from cycle ${{ github.run_id }}"
          git pull --rebase --autostash
          git push

      - name: Upload cycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-${{ github.run_id }}
          path: var/output.json
          if-no-files-found: ignore
          retention-days: 14
